<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Mentor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="sidebar">
    <div class="logo">
        <img src="{{ url_for('static', filename='logo.jpg') }}" alt="TESRECO">
        <h2>TESRECO</h2>
        <p>Intern Management Portal</p>
    </div>

    <ul>
        <li><a href="/">🏠 Dashboard</a></li>
        <li><a href="/about">🏢 About</a></li>
        <li><a href="/add-intern">➕ Register Intern</a></li>
        <li><a href="/view-interns">👨‍🎓 View Interns</a></li>
        <li><a href="/add-mentor">👨‍🏫 Add Mentor</a></li>
        <li><a href="/view-mentors">📋 View Mentors</a></li>
    </ul>
</div>

<div class="main">
    <div class="topbar">
        <h1>Edit Mentor</h1>
        <div class="profile">🔔 Administrator</div>
    </div>

    <div class="form-box compact-form">
        <h1>Update Mentor Details</h1>

        <form method="POST">
            <label>Mentor Name</label>
            <input type="text" name="name" value="{{ mentor['name'] }}" required>

            <label>Specialization</label>
            <input type="text" name="specialization" value="{{ mentor['specialization'] }}" required>

            <label>Experience (Years)</label>
            <input type="number" name="experience" value="{{ mentor['experience'] }}" min="0" required>

            <label>Email</label>
            <input type="email" name="email" value="{{ mentor['email'] }}" required>

            <label>Phone Number</label>
            <input type="tel" name="phone" value="{{ mentor['phone'] }}" required>

            <button type="submit">Update Mentor</button>
        </form>
    </div>

    <div class="footer">© 2026 TESRECO Technologies | Internship Management Portal</div>
</div>

</body>
</html>
