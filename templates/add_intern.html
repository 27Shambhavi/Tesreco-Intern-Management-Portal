<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register Intern</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<!-- ================= Sidebar ================= -->

<div class="sidebar">

    <div class="logo">

        <img src="{{ url_for('static', filename='logo.jpg') }}" alt="TESRECO">

        <h2>TESRECO</h2>

        <p>Intern Management Portal</p>

    </div>

    <ul>

        <li><a href="/">🏠 Dashboard</a></li>

        <li><a href="/about">🏢 About</a></li>

        <li><a href="/view-interns">👨‍🎓 Interns</a></li>

        <li><a href="/add-intern">➕ Register Intern</a></li>

    </ul>

</div>

<!-- ================= Main ================= -->

<div class="main">

    <div class="topbar">

        <h1>Register New Intern</h1>

        <div class="profile">

            🔔 Administrator

        </div>

    </div>

    <div class="form-box">

        <h1>Intern Registration Form</h1>

        <form action="/add-intern" method="POST">

            <label>Full Name</label>

            <input
                type="text"
                name="name"
                placeholder="Enter Intern Name"
                required>

            <label>Email Address</label>

            <input
                type="email"
                name="email"
                placeholder="Enter Email"
                required>

            <label>Domain</label>

            <input
                type="text"
                name="domain"
                placeholder="Example: Data Science"
                required>

            <button type="submit">

                Register Intern

            </button>

        </form>

    </div>

    <div class="footer">

        © 2026 TESRECO Technologies | Internship Management Portal

    </div>

</div>

</body>

</html>
